<style>
/* ── Overview body ── */ 
html:has(body.overview-mode) { height: auto; overflow: auto; }
body.overview-mode { background: #E8D8C8; display: flex; flex-direction: row; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px 16px; gap: 32px; flex-wrap: wrap; overflow: visible; height: auto; position: static; }

.ov-today-bg-img { position:absolute; inset:0; z-index:0; background-image:url('today_background.png'); background-size:cover; background-position:center 40%; }
.ov-today-bg-overlay { position:absolute; inset:0; z-index:1; background:linear-gradient(180deg,rgba(0,0,0,0.18) 0%,rgba(0,0,0,0.04) 35%,rgba(0,10,0,0.12) 100%); pointer-events:none; }

.page { display: none; flex-direction: column; min-height: 0; }
.page.active { display: flex; overflow: hidden; position: static; top: 50px; left: 0; right: 0; bottom: 60px; height: 100%; }
.page-wrapper { display: flex; flex-direction: column; align-items: center; }
.pages-container { display: flex; flex-wrap: wrap; gap: 50px; justify-content: center; }

.top-nav-today { background: rgba(0,0,0,0.15); }
.logo-icon-today { background: rgba(255,255,255,0.22); }
.nav-action-today { background: rgba(255,255,255,0.20); }
.task-center-nav { background: rgba(0,0,0,0.15); backdrop-filter: blur(24px) saturate(180%);}

/* ── Phone frame overrides ── */ 
.phone { width: 393px; height: 852px; background: var(--cream); border-radius: 50px; overflow: hidden; position: relative; box-shadow: 0 32px 80px rgba(61,43,31,0.3), 0 0 0 10px #2A1A0E, inset 0 0 0 1px rgba(255,255,255,0.2); display: flex; flex-direction: column; flex-shrink: 0; will-change: transform; transform: translateZ(0); -webkit-transform: translateZ(0); }
.phone .status-bar { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 10; position:relative; background:rgba(0,0,0,0.18); backdrop-filter:blur(16px); flex-shrink:0; }
.phone .status-time { font-family: var(--font-display); font-weight: 700; color:rgba(255,255,255,0.92); text-shadow:0 1px 4px rgba(0,0,0,0.5); }
.phone .status-icons { display: flex; gap: 6px; align-items: center; color:rgba(255,255,255,0.88); }
.phone .status-icons span { color: var(--text-primary); }
.phone .ov-today { position:relative; display:flex; flex-direction:column; overflow:hidden; }
.phone .bottom-nav { padding-bottom: 0; position: absolute; align-items: stretch; bottom: 0; left: 0; right: 0; }
.phone .bottom-nav.ov-glass { position:relative; background:rgba(0,0,0,0.15); }
.phone .bottom-nav.ov-glass .nav-label { color:rgba(255,255,255,0.88); }
.phone .bottom-nav.ov-glass .nav-item.active { background:rgba(255,255,255,0.20); }
.phone .bottom-nav.ov-glass .nav-item.active .nav-label { color:white; font-weight:800; }
</style>
</head>

function avg7(total) { return Math.ceil(total / 7); }
// ── Render ──
function buildRing(container, events) {
  if (!container) return;
  container.innerHTML = '';
  const C = 2 * Math.PI * 18;
  events.forEach(ev => {
    const pct = Math.min(ev.today / ev.avg7, 1);
    const offset = C * (1 - pct);
    const div = document.createElement('div');
    div.className = 'pr-event';
    div.innerHTML = `<div class="pr-ring-wrap"><svg class="pr-ring-svg" viewBox="0 0 44 44"><circle class="pr-ring-bg" cx="22" cy="22" r="18"/><circle class="pr-ring-fg ${ev.color}" cx="22" cy="22" r="18" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/></svg><div class="pr-ring-center">${ev.icon}<span class="pr-ring-label">${ev.name}</span></div></div><div class="pr-ring-count">${ev.today}<span>/${ev.avg7}</span></div>`;
    container.appendChild(div);
  });
}

function buildTrend(svgId, legendId, lines) {
  const svg = document.getElementById(svgId);
  const legend = document.getElementById(legendId);
  if (!svg || !legend) return;
  const W = 290, H = 100, pad = { l:8, r:8, t:8, b:4 };
  const xs = [0,1,2,3,4,5,6].map(i => pad.l + i * ((W - pad.l - pad.r) / 6));
  const yScale = v => pad.t + (5 - v) / 4 * (H - pad.t - pad.b);
  svg.innerHTML = '';
  for (let v = 1; v <= 5; v++) {
    const y = yScale(v);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', pad.l); line.setAttribute('x2', W - pad.r);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', '#EAD9C5'); line.setAttribute('stroke-width', '0.8');
    svg.appendChild(line);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', 0); t.setAttribute('y', y + 3);
    t.setAttribute('font-size', '10'); t.setAttribute('fill', '#B09880');
    t.setAttribute('font-family', 'Nunito'); t.setAttribute('font-weight', '700');
    t.textContent = v;
    svg.appendChild(t);
  }
  const lineEls = {};
  lines.forEach(ln => {
    const pts = ln.data.map((v,i) => `${xs[i]},${yScale(v)}`).join(' ');
    const el = document.createElementNS('http://www.w3.org/2000/svg','polyline');
    el.setAttribute('points', pts); el.setAttribute('fill', 'none');
    el.setAttribute('stroke', ln.color); el.setAttribute('stroke-width', '2');
    el.setAttribute('stroke-linejoin', 'round'); el.setAttribute('stroke-linecap', 'round');
    svg.appendChild(el);
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', xs[6]); dot.setAttribute('cy', yScale(ln.data[6]));
    dot.setAttribute('r', '3'); dot.setAttribute('fill', ln.color);
    svg.appendChild(dot);
    lineEls[ln.key] = [el, dot];
  });
  legend.innerHTML = '';
  lines.forEach(ln => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${ln.color}"></div>${ln.label}`;
    item.onclick = () => {
      item.classList.toggle('dimmed');
      const hidden = item.classList.contains('dimmed');
      lineEls[ln.key].forEach(el => el.setAttribute('opacity', hidden ? '0' : '1'));
    };
    legend.appendChild(item);
  });
}

function buildExpCards(containerId, exps) {

  c.innerHTML = '';
  exps.forEach(ex => {

  const el = document.getElementById(id);
  if (!el) return;
  const title = el.querySelector('.task-item-title').textContent;
  el.classList.add('task-removing');
  setTimeout(() => {

    document.getElementById('pendingCount').textContent = pendingCount;
    const badge = document.getElementById('notifBadge');
    badge.textContent = pendingCount;
    if (pendingCount === 0) badge.style.display = 'none';
    document.getElementById('doneEmpty').style.display = 'none';
    const item = document.createElement('div');
    item.className = 'task-done-item';
    item.innerHTML = `<span class="task-done-check">✔</span><span class="task-done-title">${title}</span>`;
    document.getElementById('tab-done').appendChild(item);
  }, 280);
}
function delayTask(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('task-delayed');
  setTimeout(() => el.classList.remove('task-delayed'), 6000);
}

function renderCalendar(date) {
  const calGrid = document.getElementById('calGrid');
  const calMonthEl = document.querySelector('.cal-month');
  const recordDateLabel = document.getElementById('recordDateLabel');

  calGrid.innerHTML = '';
  dayjs.locale('zh-tw');
  calMonthEl.textContent = date.format('YYYY MMMM');
  recordDateLabel.textContent = date.format('M/D dddd');

  const startWeekDay = date.startOf('month').day();
  for (let i = 0; i < startWeekDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    calGrid.appendChild(empty);
  }

  for (let d = 1; d <= date.endOf('month').date(); d++) {
    const dayDate = dayjs(new Date(date.year(), date.month(), d));
    const isToday = dayDate.isSame(dayjs(), 'day');

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day' + (isToday ? ' today' : '');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    dayEl.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    (dotData[d] || []).forEach(type => {
      const dot = document.createElement('div');
      dot.className = `day-dot dot-${type}${hiddenCategories.has(type) ? ' dot-hidden' : ''}`;
      dots.appendChild(dot);
    });
    dayEl.appendChild(dots);

    dayEl.addEventListener('click', () => {
      if (selectedDayEl) selectedDayEl.classList.remove('selected');
      dayEl.classList.add('selected');
      selectedDayEl = dayEl;
      recordDateLabel.textContent = dayDate.format('M/D dddd');
    });

    calGrid.appendChild(dayEl);
  }
}

// ── Nav ──
function initNav() {
  const prevBtn = document.querySelectorAll('.cal-arrow')[0];
  const nextBtn = document.querySelectorAll('.cal-arrow')[1];
  prevBtn.addEventListener('click', () => {
    currentDate = currentDate.subtract(1, 'month');
    renderCalendar(currentDate);
  });
  nextBtn.addEventListener('click', () => {
    currentDate = currentDate.add(1, 'month');
    renderCalendar(currentDate);
  });
}

// ── Init ──
dayjs.locale('zh-tw');
currentDate = dayjs();
buildLegend();
buildFilterTabs();
buildStatus();
renderRecords();
renderCalendar(currentDate);
initNav();
</script>
</body>
