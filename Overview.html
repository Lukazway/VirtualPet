<style>
/* ── Overview body ── */ 
html:has(body.overview-mode) { height: auto; overflow: auto; }
body.overview-mode { background: #E8D8C8; display: flex; flex-direction: row; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px 16px; gap: 32px; flex-wrap: wrap; overflow: visible; height: auto; position: static; }

.ov-today-bg-img { position:absolute; inset:0; z-index:0; background-image:url('today_background.png'); background-size:cover; background-position:center 40%; }
.ov-today-bg-overlay { position:absolute; inset:0; z-index:1; background:linear-gradient(180deg,rgba(0,0,0,0.18) 0%,rgba(0,0,0,0.04) 35%,rgba(0,10,0,0.12) 100%); pointer-events:none; }

.page { display: none; flex-direction: column; min-height: 0; }
.page.active { display: flex; overflow: hidden; position: static; top: 50px; left: 0; right: 0; bottom: 60px; height: 100%; }
.page-wrapper { display: flex; flex-direction: column; align-items: center; }
.pages-container { display: flex; flex-wrap: wrap; gap: 50px; justify-content: center; }

.top-nav-today { background: rgba(0,0,0,0.15); }
.logo-icon-today { background: rgba(255,255,255,0.22); }
.nav-action-today { background: rgba(255,255,255,0.20); }
.task-center-nav { background: rgba(0,0,0,0.15); backdrop-filter: blur(24px) saturate(180%);}

/* ── Phone frame overrides ── */ 
.phone { width: 393px; height: 852px; background: var(--cream); border-radius: 50px; overflow: hidden; position: relative; box-shadow: 0 32px 80px rgba(61,43,31,0.3), 0 0 0 10px #2A1A0E, inset 0 0 0 1px rgba(255,255,255,0.2); display: flex; flex-direction: column; flex-shrink: 0; will-change: transform; transform: translateZ(0); -webkit-transform: translateZ(0); }
.phone .status-bar { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 10; position:relative; background:rgba(0,0,0,0.18); backdrop-filter:blur(16px); flex-shrink:0; }
.phone .status-time { font-family: var(--font-display); font-weight: 700; color:rgba(255,255,255,0.92); text-shadow:0 1px 4px rgba(0,0,0,0.5); }
.phone .status-icons { display: flex; gap: 6px; align-items: center; color:rgba(255,255,255,0.88); }
.phone .status-icons span { color: var(--text-primary); }
.phone .ov-today { position:relative; display:flex; flex-direction:column; overflow:hidden; }
.phone .bottom-nav { padding-bottom: 0; position: absolute; align-items: stretch; bottom: 0; left: 0; right: 0; }
.phone .bottom-nav.ov-glass { position:relative; background:rgba(0,0,0,0.15); }
.phone .bottom-nav.ov-glass .nav-label { color:rgba(255,255,255,0.88); }
.phone .bottom-nav.ov-glass .nav-item.active { background:rgba(255,255,255,0.20); }
.phone .bottom-nav.ov-glass .nav-item.active .nav-label { color:white; font-weight:800; }
</style>
</head>

// ── Render ──
function buildRing(container, week7) {
  if (!container) return;
  container.innerHTML = '';
  const C = 2 * Math.PI * 18;
  week7.forEach(ev => {
    const { today, avg7 } = ev.data;
    const pct = Math.min(today / avg7, 1);
    const offset = C * (1 - pct);
    const colorClass = RING_COLOR(pct);
    const div = document.createElement('div');
    div.className = 'pr-event';
    div.innerHTML = `
        <div class="pr-ring-wrap">
            <svg class="pr-ring-svg" viewBox="0 0 44 44">
                <circle class="pr-ring-bg" cx="22" cy="22" r="18" />
                <circle 
                    class="pr-ring-fg ${colorClass}" 
                    cx="22" 
                    cy="22" 
                    r="18" 
                    stroke-dasharray="${C.toFixed(1)}" 
                    stroke-dashoffset="${offset.toFixed(1)}" 
                />
            </svg>
            <div class="pr-ring-center">
                ${ev.icon}
                <span class="pr-ring-label">${ev.name}</span>
            </div>
        </div>
        <div class="pr-ring-count">
            ${today}<span>/${avg7}</span>
        </div>
    `;
    container.appendChild(div);
  });
}

function buildTrend(svgId, legendId, trend) {
  const svg = document.getElementById(svgId);
  const legend = document.getElementById(legendId);
  if (!svg || !legend) return;
  const W = 290, H = 100, pad = { l:8, r:8, t:8, b:4 };
  const xs = [0,1,2,3,4,5,6].map(i => pad.l + i * ((W - pad.l - pad.r) / 6));
  const yScale = v => pad.t + (5 - v) / 4 * (H - pad.t - pad.b);
  svg.innerHTML = '';
  for (let v = 1; v <= 5; v++) {
    const y = yScale(v);
    const gridLine = document.createElementNS('http://www.w3.org/2000/svg','line');
    gridLine.setAttribute('x1', pad.l); gridLine.setAttribute('x2', W - pad.r);
    gridLine.setAttribute('y1', y); gridLine.setAttribute('y2', y);
    gridLine.setAttribute('stroke', '#EAD9C5'); gridLine.setAttribute('stroke-width', '0.8');
    svg.appendChild(gridLine);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', 0); t.setAttribute('y', y + 3);
    t.setAttribute('font-size', '10'); t.setAttribute('fill', '#B09880');
    t.setAttribute('font-family', 'Nunito'); t.setAttribute('font-weight', '700');
    t.textContent = v;
    svg.appendChild(t);
  }
  const lineEls = {};
  trend.forEach(ln => {
    const color = TREND_COLOR[ln.key] || TREND_COLOR.default;
    const pts = ln.data.map((v,i) => `${xs[i]},${yScale(v)}`).join(' ');
    const el = document.createElementNS('http://www.w3.org/2000/svg','polyline');
    el.setAttribute('points', pts); el.setAttribute('fill', 'none');
    el.setAttribute('stroke', color); el.setAttribute('stroke-width', '2');
    el.setAttribute('stroke-linejoin', 'round'); el.setAttribute('stroke-linecap', 'round');
    svg.appendChild(el);
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', xs[6]); dot.setAttribute('cy', yScale(ln.data[6]));
    dot.setAttribute('r', '3'); dot.setAttribute('fill', color);
    svg.appendChild(dot);
    lineEls[ln.key] = [el, dot];
  });
  legend.innerHTML = '';
  trend.forEach(ln => {
    const color = TREND_COLOR[ln.key] || TREND_COLOR.default;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${ln.label}`;
    item.onclick = () => {
      item.classList.toggle('dimmed');
      const hidden = item.classList.contains('dimmed');
      lineEls[ln.key].forEach(el => el.setAttribute('opacity', hidden ? '0' : '1'));
    };
    legend.appendChild(item);
  });
}

                <polyline 
                    points="${d.path}" 
                    fill="none" 
                    stroke="${pal.routeColor}" 
                    stroke-width="3" 
                    stroke-linejoin="round" 
                    stroke-linecap="round" 
                    opacity="0.9" 
                />

// ── Task controls ──
function openTaskCenter() { document.getElementById('taskOverlay').classList.add('open'); }
function closeTaskCenter() { document.getElementById('taskOverlay').classList.remove('open'); }
function switchTaskTab(btn, tab) {
  document.querySelectorAll('.task-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-pending').style.display = tab === 'pending' ? 'flex' : 'none';
  document.getElementById('tab-done').style.display = tab === 'done' ? 'flex' : 'none';
}
function completeTask(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const title = el.querySelector('.task-item-title').textContent;
  el.classList.add('task-removing');
  setTimeout(() => {
    el.remove();
    pendingCount = Math.max(0, pendingCount - 1);
    document.getElementById('pendingCount').textContent = pendingCount;
    const badge = document.getElementById('notifBadge');
    badge.textContent = pendingCount;
    if (pendingCount === 0) badge.style.display = 'none';
    document.getElementById('doneEmpty').style.display = 'none';
    const item = document.createElement('div');
    item.className = 'task-done-item';
    item.innerHTML = `<span class="task-done-check">✔</span><span class="task-done-title">${title}</span>`;
    document.getElementById('tab-done').appendChild(item);
  }, 280);
}
function delayTask(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('task-delayed');
  setTimeout(() => el.classList.remove('task-delayed'), 6000);
}

// ── State ──
let hiddenCategories = new Set();
let activeFilter = 'all';
let currentDate;
let selectedDayEl = null;
let currentMonthData = null;

// ── API fetch ──
function fetchMonthData(year, month) {
  const key = `${year}-${month}`;
  return Promise.resolve(monthlyData[key] || { year, month, days: [] });
}

function initNav() {
  document.querySelectorAll('.cal-arrow')[0].addEventListener('click', () => {
    const prev = dayjs(new Date(currentDate.year(), currentDate.month() - 1, 1));
    currentDate = prev;
    loadMonth(prev.year(), prev.month() + 1);
  });
  document.querySelectorAll('.cal-arrow')[1].addEventListener('click', () => {
    const next = dayjs(new Date(currentDate.year(), currentDate.month() + 1, 1));
    currentDate = next;
    loadMonth(next.year(), next.month() + 1);
  });
}

// ── Month navigation ──
function loadMonth(year, month) {
  fetchMonthData(year, month).then(data => {
    currentMonthData = data;
    selectedDayEl = null;
    renderCalendar(data);
  });
}

function toggleCategory(key) {
  hiddenCategories.has(key) ? hiddenCategories.delete(key) : hiddenCategories.add(key);
  document.querySelectorAll(`[data-key="${key}"]`).forEach(el => {
    el.classList.toggle('dimmed', hiddenCategories.has(key));
  });
  document.querySelectorAll(`.day-dot.dot-${key}`).forEach(dot => {
    dot.classList.toggle('dot-hidden', hiddenCategories.has(key));
  });
}

// ── Legend ──
function buildLegend(categories) {
  const container = document.getElementById('calLegend');
  container.innerHTML = '';
  categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'cal-legend-item';
    item.dataset.key = cat.key;
    let dotClass = DAY_DOT[cat.key]||DAY_DOT.default;
    item.innerHTML = `<div class="day-dot ${dotClass} cal-legend-dot"></div>${cat.label}`;
    item.addEventListener('click', () => toggleCategory(cat.key));
    container.appendChild(item);
  });
}

// ── Filter tabs ──
function buildFilterTabs(filterTabs) {
  const container = document.getElementById('recordFilterTabs');
  container.innerHTML = '';
  filterTabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'record-filter-tab' + (tab.key === activeFilter ? ' active' : '');
    btn.textContent = tab.label;
    btn.addEventListener('click', () => {
      activeFilter = tab.key;
      document.querySelectorAll('.record-filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedDayEl) renderDayDetail(selectedDayEl.dataset.date);
    });
    container.appendChild(btn);
  });
}

// ── Day detail ──
function renderDayDetail(dateStr) {
  const dayData = currentMonthData
    ? currentMonthData.days.find(d => d.date === dateStr)
    : null;

  const statusEl = document.getElementById('recordStatus');
  statusEl.innerHTML = '';
  if (dayData && dayData.status.length > 0) {
    dayData.status.forEach(b => {
      const span = document.createElement('span');
      span.className = `record-date-status-badge ${b.type}`;
      span.textContent = b.label;
      statusEl.appendChild(span);
    });
  }

  const recordEl = document.getElementById('recordList');
  recordEl.innerHTML = '';
  const allRecords = dayData ? dayData.records : [];
  const filtered = allRecords.filter(r => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'todo') return r.category === 'todo';
    return r.category !== 'todo';
  });
  if (filtered.length === 0) {
    const emptyItem = document.createElement('div');
    emptyItem.className = 'record-item record-item-empty';
    emptyItem.innerHTML = `
      <div class="record-name">無</div>
    `;
    recordEl.appendChild(emptyItem);
    return;
  }
  filtered.forEach(r => {
    const item = document.createElement('div');
    item.className = `record-item record-item-${r.category}`;
    item.innerHTML = `
      <span class="record-item-icon">${r.icon}</span>
      <div class="record-content">
        <div class="record-name">${r.name}</div>
        <div class="record-sub">${r.sub}</div>
      </div>
      <span class="record-time">${r.time}</span>`;
    recordEl.appendChild(item);
  });
}

// ── Calendar render ──
function renderCalendar(monthData) {
  const calGrid = document.getElementById('calGrid');
  const calMonthEl = document.querySelector('.cal-month');
  const recordDateLabel = document.getElementById('recordDateLabel');

  calGrid.innerHTML = '';
  dayjs.locale('zh-tw');

  const date = dayjs(new Date(monthData.year, monthData.month - 1, 1));
  calMonthEl.textContent = date.format('YYYY MMMM');

  const dateMap = {};
  monthData.days.forEach(d => { dateMap[d.date] = d; });

  const startWeekDay = date.startOf('month').day();
  for (let i = 0; i < startWeekDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    calGrid.appendChild(empty);
  }

  const today = dayjs();
  let defaultDay = null;

  for (let d = 1; d <= date.endOf('month').date(); d++) {
    const dayDate = dayjs(new Date(monthData.year, monthData.month - 1, d));
    const dateStr = dayDate.format('YYYY-MM-DD');
    const isToday = dayDate.isSame(today, 'day');
    const dayRecord = dateMap[dateStr];

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day' + (isToday ? ' today' : '');
    dayEl.dataset.date = dateStr;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    dayEl.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    if (dayRecord) {
      dayRecord.categories.forEach(cat => {
        const dot = document.createElement('div');
        dot.className = `day-dot dot-${cat}${hiddenCategories.has(cat) ? ' dot-hidden' : ''}`;
        dots.appendChild(dot);
      });
    }
    dayEl.appendChild(dots);

    dayEl.addEventListener('click', () => {
      if (selectedDayEl) selectedDayEl.classList.remove('selected');
      dayEl.classList.add('selected');
      selectedDayEl = dayEl;
      recordDateLabel.textContent = dayDate.format('M/D dddd');
      renderDayDetail(dateStr);
    });

    if (isToday) defaultDay = { el: dayEl, dateStr, label: dayDate.format('M/D dddd') };
    calGrid.appendChild(dayEl);
  }

  if (defaultDay) {
    defaultDay.el.classList.add('selected');
    selectedDayEl = defaultDay.el;
    recordDateLabel.textContent = defaultDay.label;
    renderDayDetail(defaultDay.dateStr);
  } else {
    recordDateLabel.textContent = date.format('M/D dddd');
    renderDayDetail(null);
  }
}

// ── Init ──
dayjs.locale('zh-tw');
currentDate = dayjs();
buildLegend(categories);
buildFilterTabs(filterTabs);
initNav();
loadMonth(currentDate.year(), currentDate.month() + 1);
