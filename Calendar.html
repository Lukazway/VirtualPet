<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eko — Calendar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">
  <div class="top-nav">
    <div class="nav-logo"><div class="logo-icon">🐾</div></div>
    <span class="nav-title">Calendar</span>
    <button class="nav-action">🔍</button>
  </div>

  <div class="scroll-area">
    <div class="cal-header">
      <div class="cal-month-nav">
        <button class="cal-arrow">‹</button>
        <span class="cal-month"></span>
        <button class="cal-arrow">›</button>
      </div>
      <div class="cal-legend-row" id="calLegend"></div>
    </div>

    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday">日</div><div class="cal-weekday">一</div>
        <div class="cal-weekday">二</div><div class="cal-weekday">三</div>
        <div class="cal-weekday">四</div><div class="cal-weekday">五</div>
        <div class="cal-weekday">六</div>
      </div>
      <div class="cal-days" id="calGrid"></div>
    </div>

    <div class="daily-records">
      <div class="record-date-header">
        <div class="record-date-status" id="recordStatus"></div>
        <span class="record-date-label" id="recordDateLabel"></span>
      </div>
      <div class="record-filter-tabs" id="recordFilterTabs"></div>
      <div class="record-list" id="recordList"></div>
    </div>
    <div class="cal-spacer"></div>
  </div>

  <button class="cal-fab">➕</button>

  <div class="bottom-nav">
    <button class="nav-item" onclick="location.href='Home.html'">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="location.href='Today.html'">
      <span class="nav-icon">🌤️</span><span class="nav-label">Today</span>
    </button>
    <button class="nav-item active">
      <span class="nav-icon">📅</span><span class="nav-label">Calendar</span>
    </button>
  </div>
</div>

<script src="dayjs/dayjs.min.js"></script>
<script src="dayjs/zh-tw.min.js"></script>
<script>
// ── Data ──
const categories = [
  { key: 'life',   label: '生活', dotClass: 'dot-life'   },
  { key: 'health', label: '健康', dotClass: 'dot-health' },
  { key: 'exp',    label: '體驗', dotClass: 'dot-exp'    },
  { key: 'todo',   label: '待辦', dotClass: 'dot-todo'   },
];

const dotData = {
  1:  ['life','health'],
  2:  ['life','exp'],
  3:  ['life','health','exp'],
  4:  ['life','todo'],
  5:  ['life','health','exp','todo'],
  6:  ['life','health','todo'],
  7:  ['life','exp'],
  8:  ['life','health'],
  9:  ['life'],
  10: ['life','health','exp'],
  12: ['life','todo'],
  14: ['life','health'],
  15: ['life','exp'],
  18: ['life','health'],
  20: ['life','exp'],
  22: ['health','todo'],
  25: ['life'],
  28: ['life','health','exp'],
};

const statusBadges = [
  { label: '😊 Happy',   type: 'good' },
  { label: '身體狀況良好', type: 'good' },
  { label: '活動量偏低',  type: 'warn' },
];

const filterTabs = [
  { key: 'all',    label: '全部' },
  { key: 'record', label: '記錄' },
  { key: 'todo',   label: '待辦' },
];

const records = [
  { icon: '🥣', name: '早餐',      sub: '乾飼料 200g · Seoli', time: '07:30', category: 'life'   },
  { icon: '🚶', name: '晨間散步',  sub: '0.8 km · 18 分鐘 · 晴天', time: '08:15', category: 'exp' },
  { icon: '💚', name: '健康狀態確認', sub: '飲食：正常 · 情緒：開心', time: '09:00', category: 'health' },
  { icon: '🍱', name: '午餐',      sub: '濕糧 150g · Lele',    time: '12:00', category: 'life'   },
  { icon: '⏰', name: '傍晚散步',  sub: '提醒：30 分鐘 · Seoli', time: '18:00', category: 'exp'  },
  { icon: '💊', name: 'Lele 用藥', sub: '跳蚤預防藥今天到期',   time: '20:00', category: 'todo'  },
];

// ── State ──
let hiddenCategories = new Set();
let activeFilter = 'all';
let currentDate;
let selectedDayEl = null;

// ── Legend ──
function buildLegend() {
  const container = document.getElementById('calLegend');
  container.innerHTML = '';
  categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'cal-legend-item';
    item.dataset.key = cat.key;
    item.innerHTML = `<div class="day-dot ${cat.dotClass} cal-legend-dot"></div>${cat.label}`;
    item.addEventListener('click', () => toggleCategory(cat.key));
    container.appendChild(item);
  });
}

function toggleCategory(key) {
  if (hiddenCategories.has(key)) {
    hiddenCategories.delete(key);
  } else {
    hiddenCategories.add(key);
  }
  document.querySelectorAll(`[data-key="${key}"]`).forEach(el => {
    el.classList.toggle('dimmed', hiddenCategories.has(key));
  });
  document.querySelectorAll(`.day-dot.dot-${key}`).forEach(dot => {
    dot.classList.toggle('dot-hidden', hiddenCategories.has(key));
  });
}

// ── Filter tabs ──
function buildFilterTabs() {
  const container = document.getElementById('recordFilterTabs');
  container.innerHTML = '';
  filterTabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'record-filter-tab' + (tab.key === activeFilter ? ' active' : '');
    btn.textContent = tab.label;
    btn.addEventListener('click', () => {
      activeFilter = tab.key;
      document.querySelectorAll('.record-filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRecords();
    });
    container.appendChild(btn);
  });
}

// ── Status badges ──
function buildStatus() {
  const container = document.getElementById('recordStatus');
  container.innerHTML = '';
  statusBadges.forEach(b => {
    const span = document.createElement('span');
    span.className = `record-date-status-badge ${b.type}`;
    span.textContent = b.label;
    container.appendChild(span);
  });
}

// ── Record list ──
function renderRecords() {
  const container = document.getElementById('recordList');
  container.innerHTML = '';
  const filtered = records.filter(r => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'todo') return r.category === 'todo';
    return r.category !== 'todo';
  });
  filtered.forEach(r => {
    const item = document.createElement('div');
    item.className = `record-item record-item-${r.category}`;
    item.dataset.type = r.category === 'todo' ? 'todo' : 'record';
    item.innerHTML = `
      <span class="record-item-icon">${r.icon}</span>
      <div class="record-content">
        <div class="record-name">${r.name}</div>
        <div class="record-sub">${r.sub}</div>
      </div>
      <span class="record-time">${r.time}</span>`;
    container.appendChild(item);
  });
}

// ── Calendar ──
function renderCalendar(date) {
  const calGrid = document.getElementById('calGrid');
  const calMonthEl = document.querySelector('.cal-month');
  const recordDateLabel = document.getElementById('recordDateLabel');

  calGrid.innerHTML = '';
  dayjs.locale('zh-tw');
  calMonthEl.textContent = date.format('YYYY MMMM');
  recordDateLabel.textContent = date.format('M/D dddd');

  const startWeekDay = date.startOf('month').day();
  for (let i = 0; i < startWeekDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    calGrid.appendChild(empty);
  }

  for (let d = 1; d <= date.endOf('month').date(); d++) {
    const dayDate = dayjs(new Date(date.year(), date.month(), d));
    const isToday = dayDate.isSame(dayjs(), 'day');

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day' + (isToday ? ' today' : '');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    dayEl.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    (dotData[d] || []).forEach(type => {
      const dot = document.createElement('div');
      dot.className = `day-dot dot-${type}${hiddenCategories.has(type) ? ' dot-hidden' : ''}`;
      dots.appendChild(dot);
    });
    dayEl.appendChild(dots);

    dayEl.addEventListener('click', () => {
      if (selectedDayEl) selectedDayEl.classList.remove('selected');
      dayEl.classList.add('selected');
      selectedDayEl = dayEl;
      recordDateLabel.textContent = dayDate.format('M/D dddd');
    });

    calGrid.appendChild(dayEl);
  }
}

// ── Nav ──
function initNav() {
  const prevBtn = document.querySelectorAll('.cal-arrow')[0];
  const nextBtn = document.querySelectorAll('.cal-arrow')[1];
  prevBtn.addEventListener('click', () => {
    currentDate = currentDate.subtract(1, 'month');
    renderCalendar(currentDate);
  });
  nextBtn.addEventListener('click', () => {
    currentDate = currentDate.add(1, 'month');
    renderCalendar(currentDate);
  });
}

// ── Init ──
dayjs.locale('zh-tw');
currentDate = dayjs();
buildLegend();
buildFilterTabs();
buildStatus();
renderRecords();
renderCalendar(currentDate);
initNav();
</script>
</body>
</html>
