<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eko — Calendar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">
  <div class="top-nav">
    <div class="nav-logo">
      <div class="logo-icon">🐾</div>
    </div>
    <span class="nav-title">Calendar</span>
    <button class="nav-action">🔍</button>
  </div>

  <div class="scroll-area">
    <div class="cal-header">
      <div class="cal-month-nav">
        <button class="cal-arrow">‹</button>
        <span class="cal-month"></span>
        <button class="cal-arrow">›</button>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text-muted);"><div class="day-dot dot-life" style="width:8px;height:8px;"></div>生活</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text-muted);"><div class="day-dot dot-health" style="width:8px;height:8px;"></div>健康</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text-muted);"><div class="day-dot dot-exp" style="width:8px;height:8px;"></div>活動</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text-muted);"><div class="day-dot dot-todo" style="width:8px;height:8px;"></div>待辦</div>
      </div>
    </div>

    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-weekday">日</div><div class="cal-weekday">一</div>
        <div class="cal-weekday">二</div><div class="cal-weekday">三</div>
        <div class="cal-weekday">四</div><div class="cal-weekday">五</div>
        <div class="cal-weekday">六</div>
      </div>
      <div class="cal-days" id="calGrid"></div>
    </div>

    <div class="daily-records">
      <div class="record-date-header"></div>
      <div class="record-list">
        <div class="record-item">
          <span class="record-time">07:30</span>
          <div class="record-type-dot dot-life"></div>
          <div class="record-content">
            <div class="record-name">早餐</div>
            <div class="record-sub">乾飼料 200g · Seoli</div>
          </div>
          <span class="record-emoji">🥣</span>
        </div>
        <div class="record-item">
          <span class="record-time">08:15</span>
          <div class="record-type-dot dot-exp"></div>
          <div class="record-content">
            <div class="record-name">晨間散步</div>
            <div class="record-sub">0.8 km · 18 分鐘 · 晴天</div>
          </div>
          <span class="record-emoji">🚶</span>
        </div>
        <div class="record-item">
          <span class="record-time">09:00</span>
          <div class="record-type-dot dot-health"></div>
          <div class="record-content">
            <div class="record-name">健康狀態確認</div>
            <div class="record-sub">飲食：正常 · 情緒：開心</div>
          </div>
          <span class="record-emoji">💚</span>
        </div>
        <div class="record-item">
          <span class="record-time">12:00</span>
          <div class="record-type-dot dot-life"></div>
          <div class="record-content">
            <div class="record-name">午餐</div>
            <div class="record-sub">濕糧 150g · Lele</div>
          </div>
          <span class="record-emoji">🍱</span>
        </div>
        <div class="record-item">
          <span class="record-time">18:00</span>
          <div class="record-type-dot dot-todo"></div>
          <div class="record-content">
            <div class="record-name">傍晚散步（待辦）</div>
            <div class="record-sub">提醒：30 分鐘 · Seoli</div>
          </div>
          <span class="record-emoji">⏰</span>
        </div>
        <div class="record-item">
          <span class="record-time">20:00</span>
          <div class="record-type-dot dot-todo"></div>
          <div class="record-content">
            <div class="record-name">Lele 用藥（待辦）</div>
            <div class="record-sub">跳蚤預防藥今天到期</div>
          </div>
          <span class="record-emoji">💊</span>
        </div>
      </div>
    </div>
    <div style="height:32px;"></div>
  </div><!-- /scroll-area -->

  <button class="cal-fab" onclick="openSheet()">➕</button>

  <div class="bottom-nav">
    <button class="nav-item" onclick="location.href='Home.html'">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="location.href='Today.html'">
      <span class="nav-icon">🌤️</span>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-item active">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Calendar</span>
    </button>
  </div>
</div><!-- /app-shell -->

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">快速記錄</div>
    <div class="sheet-tabs">
      <button class="sheet-tab active" onclick="switchTab(this,'life')">生活記錄</button>
      <button class="sheet-tab" onclick="switchTab(this,'status')">狀態評分</button>
      <button class="sheet-tab" onclick="switchTab(this,'exp')">體驗記錄</button>
    </div>

    <div class="sheet-tab-content">
      <!-- Tab: 生活記錄 -->
      <div id="tab-life">
        <div class="sheet-grid">
          <button class="sheet-item"><span class="sheet-item-icon">🥣</span><span class="sheet-item-label">吃飯</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">💧</span><span class="sheet-item-label">喝水</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">🦴</span><span class="sheet-item-label">零食</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">💊</span><span class="sheet-item-label">藥物</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">💩</span><span class="sheet-item-label">大便</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">🚿</span><span class="sheet-item-label">小便</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">🚶</span><span class="sheet-item-label">散步</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">🎮</span><span class="sheet-item-label">玩耍</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">😴</span><span class="sheet-item-label">睡眠</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">✂️</span><span class="sheet-item-label">美容</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">🛁</span><span class="sheet-item-label">洗澡</span></button>
          <button class="sheet-item"><span class="sheet-item-icon">🏥</span><span class="sheet-item-label">就診</span></button>
        </div>
      </div>

      <!-- Tab: 狀態評分 -->
      <div id="tab-status" style="display:none;">
        <div class="rating-list">
          <div class="rating-item">
            <div class="rating-header">
              <span class="rating-name">🍽️ 飲食</span>
              <div class="rating-emojis">
                <span class="rating-emoji" data-v="1">😣</span>
                <span class="rating-emoji" data-v="2">😕</span>
                <span class="rating-emoji selected" data-v="3">😊</span>
                <span class="rating-emoji" data-v="4">😄</span>
                <span class="rating-emoji" data-v="5">🤩</span>
              </div>
            </div>
            <input type="range" class="rating-slider" min="1" max="5" value="3">
          </div>
          <div class="rating-item">
            <div class="rating-header">
              <span class="rating-name">💩 排泄</span>
              <div class="rating-emojis">
                <span class="rating-emoji" data-v="1">😣</span>
                <span class="rating-emoji" data-v="2">😕</span>
                <span class="rating-emoji" data-v="3">😊</span>
                <span class="rating-emoji selected" data-v="4">😄</span>
                <span class="rating-emoji" data-v="5">🤩</span>
              </div>
            </div>
            <input type="range" class="rating-slider" min="1" max="5" value="4">
          </div>
          <div class="rating-item">
            <div class="rating-header">
              <span class="rating-name">🩺 身體</span>
              <div class="rating-emojis">
                <span class="rating-emoji" data-v="1">😣</span>
                <span class="rating-emoji" data-v="2">😕</span>
                <span class="rating-emoji selected" data-v="3">😊</span>
                <span class="rating-emoji" data-v="4">😄</span>
                <span class="rating-emoji" data-v="5">🤩</span>
              </div>
            </div>
            <input type="range" class="rating-slider" min="1" max="5" value="3">
          </div>
          <div class="rating-item">
            <div class="rating-header">
              <span class="rating-name">🏃 活動</span>
              <div class="rating-emojis">
                <span class="rating-emoji selected" data-v="1">😣</span>
                <span class="rating-emoji" data-v="2">😕</span>
                <span class="rating-emoji" data-v="3">😊</span>
                <span class="rating-emoji" data-v="4">😄</span>
                <span class="rating-emoji" data-v="5">🤩</span>
              </div>
            </div>
            <input type="range" class="rating-slider" min="1" max="5" value="1">
          </div>
          <div class="rating-item">
            <div class="rating-header">
              <span class="rating-name">😊 情緒</span>
              <div class="rating-emojis">
                <span class="rating-emoji" data-v="1">😣</span>
                <span class="rating-emoji" data-v="2">😕</span>
                <span class="rating-emoji" data-v="3">😊</span>
                <span class="rating-emoji selected" data-v="4">😄</span>
                <span class="rating-emoji" data-v="5">🤩</span>
              </div>
            </div>
            <input type="range" class="rating-slider" min="1" max="5" value="4">
          </div>
        </div>
      </div>

      <!-- Tab: 體驗記錄 -->
      <div id="tab-exp" style="display:none;">
        <div class="sheet-grid" style="grid-template-columns:repeat(2,1fr);gap:12px;padding:0 24px;">
          <button class="sheet-item" style="padding:20px 16px;"><span class="sheet-item-icon" style="font-size:32px;">🚶</span><span class="sheet-item-label" style="font-size:13px;">散步</span></button>
          <button class="sheet-item" style="padding:20px 16px;"><span class="sheet-item-icon" style="font-size:32px;">🏃</span><span class="sheet-item-label" style="font-size:13px;">公園跑步</span></button>
          <button class="sheet-item" style="padding:20px 16px;"><span class="sheet-item-icon" style="font-size:32px;">🏊</span><span class="sheet-item-label" style="font-size:13px;">游泳</span></button>
          <button class="sheet-item" style="padding:20px 16px;"><span class="sheet-item-icon" style="font-size:32px;">🎮</span><span class="sheet-item-label" style="font-size:13px;">遊戲</span></button>
        </div>
      </div>
    </div>

    <div class="sheet-save">
      <button class="sheet-save-btn">儲存記錄</button>
    </div>
  </div>
</div>

<script src="dayjs/dayjs.min.js"></script>
<script src="dayjs/zh-tw.min.js"></script>
<script>
dayjs.locale('zh-tw');
const calGrid = document.getElementById('calGrid');
const calMonthEl = document.querySelector('.cal-month');
const recordDate = document.querySelector('.record-date-header');
const prevBtn = document.querySelectorAll('.cal-arrow')[0];
const nextBtn = document.querySelectorAll('.cal-arrow')[1];
const dotData = {
  1:['life','health'], 2:['life','exp'], 3:['life','health','exp'],
  4:['life','todo'], 5:['life','health','exp','todo'], 6:['life','health','todo'],
  7:['life','exp'], 8:['life','health'], 9:['life'], 10:['life','health','exp'],
  12:['life','todo'], 14:['life','health'], 15:['life','exp'],
  18:['life','health'], 20:['life','exp'], 22:['health','todo'],
  25:['life'], 28:['life','health','exp'],
};
let currentDate = dayjs();
let selectedDayEl = null;

function renderCalendar(date) {
  calGrid.innerHTML = '';

  // 月份顯示
  calMonthEl.textContent = date.format('YYYY MMMM')
  recordDate.textContent = date.format('M/D dddd');
  const startOfMonth = date.startOf('month');
  const endOfMonth = date.endOf('month');
  const startWeekDay = startOfMonth.day();

  // 空格
  for (let i = 0; i < startWeekDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    calGrid.appendChild(empty);
  }

  // 日期
  for (let d = 1; d <= endOfMonth.date(); d++) {
    const dayEl = document.createElement('div');

    const dayDate = dayjs(new Date(date.year(), date.month(), d));
    const today = dayDate.isSame(dayjs(), 'day');

    dayEl.className = 'cal-day' + (today ? ' today' : '');
    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    dayEl.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    (dotData[d] || []).forEach(type => {
      const dot = document.createElement('div');
      dot.className = 'day-dot dot-' + type;
      dots.appendChild(dot);
    });
    dayEl.appendChild(dots);

    dayEl.addEventListener('click', () => {
      if (selectedDayEl) selectedDayEl.classList.remove('selected');
      dayEl.classList.add('selected');
      selectedDayEl = dayEl;
      recordDate.textContent = dayDate.format('M/D dddd');
    });

    calGrid.appendChild(dayEl);
  }
}

// 上一個月
prevBtn.addEventListener('click', () => {
  currentDate = currentDate.subtract(1, 'month');
  renderCalendar(currentDate);
});

// 下一個月
nextBtn.addEventListener('click', () => {
  currentDate = currentDate.add(1, 'month');
  renderCalendar(currentDate);
});

renderCalendar(currentDate);

function openSheet() { document.getElementById('sheetOverlay').classList.add('open'); }
function closeSheet(e) {
  if (e.target === document.getElementById('sheetOverlay'))
    document.getElementById('sheetOverlay').classList.remove('open');
}
function switchTab(btn, tab) {
  document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['life','status','exp'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}
document.querySelectorAll('.rating-item').forEach(item => {
  const slider = item.querySelector('.rating-slider');
  const emojis = item.querySelectorAll('.rating-emoji');
  function sync(v) {
    emojis.forEach(e => e.classList.toggle('selected', parseInt(e.dataset.v) === v));
    slider.value = v;
  }
  slider.addEventListener('input', () => sync(parseInt(slider.value)));
  emojis.forEach(e => e.addEventListener('click', () => sync(parseInt(e.dataset.v))));
});
</script>
</body>
</html>
