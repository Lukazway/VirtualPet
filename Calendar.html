// ── State ──
let hiddenCategories = new Set();
let activeFilter = 'all';
let currentDate;
let selectedDayEl = null;
let currentMonthData = null;

// ── API fetch ──
function fetchMonthData(year, month) {
  const key = `${year}-${month}`;
  return Promise.resolve(monthlyData[key] || { year, month, days: [] });
}

function initNav() {
  document.querySelectorAll('.cal-arrow')[0].addEventListener('click', () => {
    const prev = dayjs(new Date(currentDate.year(), currentDate.month() - 1, 1));
    currentDate = prev;
    loadMonth(prev.year(), prev.month() + 1);
  });
  document.querySelectorAll('.cal-arrow')[1].addEventListener('click', () => {
    const next = dayjs(new Date(currentDate.year(), currentDate.month() + 1, 1));
    currentDate = next;
    loadMonth(next.year(), next.month() + 1);
  });
}

// ── Month navigation ──
function loadMonth(year, month) {
  fetchMonthData(year, month).then(data => {
    currentMonthData = data;
    selectedDayEl = null;
    renderCalendar(data);
  });
}

function toggleCategory(key) {
  hiddenCategories.has(key) ? hiddenCategories.delete(key) : hiddenCategories.add(key);
  document.querySelectorAll(`[data-key="${key}"]`).forEach(el => {
    el.classList.toggle('dimmed', hiddenCategories.has(key));
  });
  document.querySelectorAll(`.day-dot.dot-${key}`).forEach(dot => {
    dot.classList.toggle('dot-hidden', hiddenCategories.has(key));
  });
}

// ── Legend ──
function buildLegend(categories) {
  const container = document.getElementById('calLegend');
  container.innerHTML = '';
  categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'cal-legend-item';
    item.dataset.key = cat.key;
    let dotClass = DAY_DOT[cat.key]||DAY_DOT.default;
    item.innerHTML = `<div class="day-dot ${dotClass} cal-legend-dot"></div>${cat.label}`;
    item.addEventListener('click', () => toggleCategory(cat.key));
    container.appendChild(item);
  });
}

// ── Filter tabs ──
function buildFilterTabs(filterTabs) {
  const container = document.getElementById('recordFilterTabs');
  container.innerHTML = '';
  filterTabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'record-filter-tab' + (tab.key === activeFilter ? ' active' : '');
    btn.textContent = tab.label;
    btn.addEventListener('click', () => {
      activeFilter = tab.key;
      document.querySelectorAll('.record-filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedDayEl) renderDayDetail(selectedDayEl.dataset.date);
    });
    container.appendChild(btn);
  });
}

// ── Day detail ──
function renderDayDetail(dateStr) {
  const dayData = currentMonthData
    ? currentMonthData.days.find(d => d.date === dateStr)
    : null;

  const statusEl = document.getElementById('recordStatus');
  statusEl.innerHTML = '';
  if (dayData && dayData.status.length > 0) {
    dayData.status.forEach(b => {
      const span = document.createElement('span');
      span.className = `record-date-status-badge ${b.type}`;
      span.textContent = b.label;
      statusEl.appendChild(span);
    });
  }

  const recordEl = document.getElementById('recordList');
  recordEl.innerHTML = '';
  const allRecords = dayData ? dayData.records : [];
  const filtered = allRecords.filter(r => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'todo') return r.category === 'todo';
    return r.category !== 'todo';
  });
  if (filtered.length === 0) {
    const emptyItem = document.createElement('div');
    emptyItem.className = 'record-item record-item-empty';
    emptyItem.innerHTML = `
      <div class="record-name">無</div>
    `;
    recordEl.appendChild(emptyItem);
    return;
  }
  filtered.forEach(r => {
    const item = document.createElement('div');
    item.className = `record-item record-item-${r.category}`;
    item.innerHTML = `
      <span class="record-item-icon">${r.icon}</span>
      <div class="record-content">
        <div class="record-name">${r.name}</div>
        <div class="record-sub">${r.sub}</div>
      </div>
      <span class="record-time">${r.time}</span>`;
    recordEl.appendChild(item);
  });
}

// ── Calendar render ──
function renderCalendar(monthData) {
  const calGrid = document.getElementById('calGrid');
  const calMonthEl = document.querySelector('.cal-month');
  const recordDateLabel = document.getElementById('recordDateLabel');

  calGrid.innerHTML = '';
  dayjs.locale('zh-tw');

  const date = dayjs(new Date(monthData.year, monthData.month - 1, 1));
  calMonthEl.textContent = date.format('YYYY MMMM');

  const dateMap = {};
  monthData.days.forEach(d => { dateMap[d.date] = d; });

  const startWeekDay = date.startOf('month').day();
  for (let i = 0; i < startWeekDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    calGrid.appendChild(empty);
  }

  const today = dayjs();
  let defaultDay = null;

  for (let d = 1; d <= date.endOf('month').date(); d++) {
    const dayDate = dayjs(new Date(monthData.year, monthData.month - 1, d));
    const dateStr = dayDate.format('YYYY-MM-DD');
    const isToday = dayDate.isSame(today, 'day');
    const dayRecord = dateMap[dateStr];

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day' + (isToday ? ' today' : '');
    dayEl.dataset.date = dateStr;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    dayEl.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'day-dots';
    if (dayRecord) {
      dayRecord.categories.forEach(cat => {
        const dot = document.createElement('div');
        dot.className = `day-dot dot-${cat}${hiddenCategories.has(cat) ? ' dot-hidden' : ''}`;
        dots.appendChild(dot);
      });
    }
    dayEl.appendChild(dots);

    dayEl.addEventListener('click', () => {
      if (selectedDayEl) selectedDayEl.classList.remove('selected');
      dayEl.classList.add('selected');
      selectedDayEl = dayEl;
      recordDateLabel.textContent = dayDate.format('M/D dddd');
      renderDayDetail(dateStr);
    });

    if (isToday) defaultDay = { el: dayEl, dateStr, label: dayDate.format('M/D dddd') };
    calGrid.appendChild(dayEl);
  }

  if (defaultDay) {
    defaultDay.el.classList.add('selected');
    selectedDayEl = defaultDay.el;
    recordDateLabel.textContent = defaultDay.label;
    renderDayDetail(defaultDay.dateStr);
  } else {
    recordDateLabel.textContent = date.format('M/D dddd');
    renderDayDetail(null);
  }
}

// ── Init ──
dayjs.locale('zh-tw');
currentDate = dayjs();
buildLegend(categories);
buildFilterTabs(filterTabs);
initNav();
loadMonth(currentDate.year(), currentDate.month() + 1);
</script>
</body>
