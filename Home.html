// ── Render ──
function buildRing(container, week7) {
  if (!container) return;
  container.innerHTML = '';
  const C = 2 * Math.PI * 18;
  week7.forEach(ev => {
    const { today, avg7 } = ev.data;
    const pct = Math.min(today / avg7, 1);
    const offset = C * (1 - pct);
    const colorClass = RING_COLOR(pct);
    const div = document.createElement('div');
    div.className = 'pr-event';
    div.innerHTML = `
        <div class="pr-ring-wrap">
            <svg class="pr-ring-svg" viewBox="0 0 44 44">
                <circle class="pr-ring-bg" cx="22" cy="22" r="18" />
                <circle 
                    class="pr-ring-fg ${colorClass}" 
                    cx="22" 
                    cy="22" 
                    r="18" 
                    stroke-dasharray="${C.toFixed(1)}" 
                    stroke-dashoffset="${offset.toFixed(1)}" 
                />
            </svg>
            <div class="pr-ring-center">
                ${ev.icon}
                <span class="pr-ring-label">${ev.name}</span>
            </div>
        </div>
        <div class="pr-ring-count">
            ${today}<span>/${avg7}</span>
        </div>
    `;
    container.appendChild(div);
  });
}

function buildTrend(svgId, legendId, trend) {
  const svg = document.getElementById(svgId);
  const legend = document.getElementById(legendId);
  if (!svg || !legend) return;
  const W = 290, H = 100, pad = { l:8, r:8, t:8, b:4 };
  const xs = [0,1,2,3,4,5,6].map(i => pad.l + i * ((W - pad.l - pad.r) / 6));
  const yScale = v => pad.t + (5 - v) / 4 * (H - pad.t - pad.b);
  svg.innerHTML = '';
  for (let v = 1; v <= 5; v++) {
    const y = yScale(v);
    const gridLine = document.createElementNS('http://www.w3.org/2000/svg','line');
    gridLine.setAttribute('x1', pad.l); gridLine.setAttribute('x2', W - pad.r);
    gridLine.setAttribute('y1', y); gridLine.setAttribute('y2', y);
    gridLine.setAttribute('stroke', '#EAD9C5'); gridLine.setAttribute('stroke-width', '0.8');
    svg.appendChild(gridLine);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', 0); t.setAttribute('y', y + 3);
    t.setAttribute('font-size', '10'); t.setAttribute('fill', '#B09880');
    t.setAttribute('font-family', 'Nunito'); t.setAttribute('font-weight', '700');
    t.textContent = v;
    svg.appendChild(t);
  }
  const lineEls = {};
  trend.forEach(ln => {
    const color = TREND_COLOR[ln.key] || TREND_COLOR.default;
    const pts = ln.data.map((v,i) => `${xs[i]},${yScale(v)}`).join(' ');
    const el = document.createElementNS('http://www.w3.org/2000/svg','polyline');
    el.setAttribute('points', pts); el.setAttribute('fill', 'none');
    el.setAttribute('stroke', color); el.setAttribute('stroke-width', '2');
    el.setAttribute('stroke-linejoin', 'round'); el.setAttribute('stroke-linecap', 'round');
    svg.appendChild(el);
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', xs[6]); dot.setAttribute('cy', yScale(ln.data[6]));
    dot.setAttribute('r', '3'); dot.setAttribute('fill', color);
    svg.appendChild(dot);
    lineEls[ln.key] = [el, dot];
  });
  legend.innerHTML = '';
  trend.forEach(ln => {
    const color = TREND_COLOR[ln.key] || TREND_COLOR.default;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${ln.label}`;
    item.onclick = () => {
      item.classList.toggle('dimmed');
      const hidden = item.classList.contains('dimmed');
      lineEls[ln.key].forEach(el => el.setAttribute('opacity', hidden ? '0' : '1'));
    };
    legend.appendChild(item);
  });
}

function buildExpCards(containerId, exps) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  exps.forEach(ex => {
    const pal = EXP_PALETTE[ex.type] || EXP_PALETTE.default;
    const d = ex.data;
    const card = document.createElement('div');
    card.className = 'exp-card-v2';
    card.innerHTML = `
        <div class="exp-map">
            <svg class="exp-map-svg" viewBox="0 0 340 80" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <linearGradient id="mg${ex.id}" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="${pal.mapC1}" />
                        <stop offset="100%" stop-color="${pal.mapC2}" />
                    </linearGradient>
                </defs>
                
                <rect width="340" height="80" fill="url(#mg${ex.id})" />
                <line x1="0" y1="30" x2="340" y2="30" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
                <line x1="0" y1="55" x2="340" y2="55" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
                <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
                <line x1="180" y1="0" x2="180" y2="80" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
                <line x1="260" y1="0" x2="260" y2="80" stroke="rgba(255,255,255,0.25)" stroke-width="1" />
                
                <polyline 
                    points="${d.path}" 
                    fill="none" 
                    stroke="${pal.routeColor}" 
                    stroke-width="3" 
                    stroke-linejoin="round" 
                    stroke-linecap="round" 
                    opacity="0.9" 
                />
                
                <circle cx="${d.startX}" cy="${d.startY}" r="5" fill="white" opacity="0.9" />
                <circle cx="${d.startX}" cy="${d.startY}" r="3" fill="${pal.routeColor}" />
                
                <circle cx="${d.endX}" cy="${d.endY}" r="5" fill="white" opacity="0.9" />
                <circle cx="${d.endX}" cy="${d.endY}" r="3" fill="var(--peach-deep)" />
            </svg>
            
            <div class="exp-map-badge">${ex.icon} ${ex.type}</div>
        </div>

        <div class="exp-card-body">
            <div class="exp-card-left">
                <div class="exp-card-title">${d.name}</div>
                <div class="exp-card-date">${ex.data.date} · ${d.weather}</div>
            </div>
            
            <div class="exp-card-stats">
                <div class="exp-stat">
                    <span class="exp-stat-val">${d.duration}</span>
                    <span class="exp-stat-label">時長</span>
                </div>
                <div class="exp-stat">
                    <span class="exp-stat-val">${d.steps}</span>
                    <span class="exp-stat-label">步數</span>
                </div>
                <div class="exp-stat">
                    <span class="exp-stat-val">${d.temp}</span>
                    <span class="exp-stat-label">氣溫</span>
                </div>
            </div>
        </div>
    `;
    c.appendChild(card);
  });
}

function buildPetCard(pet) {
  const card = document.createElement('div');
  card.className = 'pet-card';
  const alertsHTML = pet.alerts.map(a => `
    <div class="hs-alert ${ALERT_CLASS[a.urgency] || ALERT_CLASS.default}">
      <span class="hs-alert-icon">${a.icon}</span>
      <div class="hs-alert-body">
        <div class="hs-alert-title">${a.title}</div>
        <div class="hs-alert-sub">${a.sub}</div>
      </div>
    </div>`).join('');
  const badgeClass = BADGE_CLASS[pet.badge] || BADGE_CLASS.default;
  card.innerHTML = `
    <div class="pet-card-header" onclick="togglePetRecords('${pet.id}')">
      <div class="pet-avatar-wrap">
        <img class="pet-avatar" src="${pet.avatar}">
        <div class="pet-avatar-badge ${badgeClass}">${pet.badgeLabel}</div>
      </div>
      <div class="pet-info">
        <div class="pet-name">${pet.name}</div>
        <div class="pet-breed">${pet.breed}</div>
        <div class="pet-age-tag">🎂 ${pet.age}</div>
      </div>
      <div class="pet-card-more" onclick="event.stopPropagation(); alert('編輯 ${pet.name}')">✏️</div>
    </div>
    <div class="health-strip">
      <div class="hs-alerts">${alertsHTML}</div>
    </div>
    <div class="pet-records collapsed" id="pr-${pet.id}">
      <div class="pr-tabs">
        <button class="pr-tab active" onclick="switchPrTab(this,'life','${pet.id}')">生活摘要</button>
        <button class="pr-tab" onclick="switchPrTab(this,'status','${pet.id}')">狀態趨勢</button>
        <button class="pr-tab" onclick="switchPrTab(this,'exp','${pet.id}')">最近體驗</button>
      </div>
      <div class="pr-panel active" id="pr-life-${pet.id}">
        <div class="pr-row-label">7天 Top 10 · 今天 / 7天均值</div>
        <div class="pr-events-row" id="row7-${pet.id}"></div>
      </div>
      <div class="pr-panel pr-panel-scroll" id="pr-status-${pet.id}">
        <div class="status-legend" id="legend-${pet.id}"></div>
        <div class="trend-chart-wrap trend-chart-clickable" onclick="">
          <svg class="trend-svg" id="trend-svg-${pet.id}" viewBox="0 0 290 100" preserveAspectRatio="none"></svg>
          <div class="trend-x-labels">
            <span class="trend-x-label">Mon</span><span class="trend-x-label">Tue</span>
            <span class="trend-x-label">Wed</span><span class="trend-x-label">Thu</span>
            <span class="trend-x-label">Fri</span><span class="trend-x-label">Sat</span>
            <span class="trend-x-label">今</span>
          </div>
          <div class="trend-chart-hint">點擊查看完整健康數據 ›</div>
        </div>
      </div>
      <div class="pr-panel pr-panel-scroll" id="pr-exp-${pet.id}">
        <div class="exp-list" id="exp-list-${pet.id}"></div>
      </div>
    </div>`;
  return card;
}

function buildSharedSection(data) {
  const section = document.getElementById('sharedSection');
  const membersHTML = data.members.map(m => `<div class="member-avatar">${m.emoji}</div>`).join('');
  section.innerHTML = `
    <div class="shared-desc">${data.desc}</div>
    <div class="shared-members">${membersHTML}<div class="add-member">+</div></div>
    <button class="invite-btn">✉️ 發送邀請</button>`;
}

function togglePetRecords(pet) {
  document.getElementById('pr-' + pet).classList.toggle('collapsed');
}
function switchPrTab(btn, tab, pet) {
  const card = btn.closest('.pet-card');
  card.querySelectorAll('.pr-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  card.querySelectorAll('.pr-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('pr-' + tab + '-' + pet).classList.add('active');
}

// ── Init ──

petsData.forEach(pet => {
  grid.appendChild(buildPetCard(pet));
  buildRing(document.getElementById('row7-' + pet.id), pet.week7);
  buildTrend('trend-svg-' + pet.id, 'legend-' + pet.id, pet.trend);
  buildExpCards('exp-list-' + pet.id, pet.exps);
});
