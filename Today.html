<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Eko — Today</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="today-page">

<div class="today-bg-photo"></div>
<div class="today-bg-overlay"></div>

<div class="app-shell">
  <div class="top-nav">
    <div class="nav-logo"><div class="logo-icon">🐾</div></div>
    <span class="nav-title">Today</span>
    <button class="nav-action" onclick="openTaskCenter()">
      🔔
      <span class="notif-badge" id="notifBadge"></span>
    </button>
  </div>

  <div class="today-scene">
    <div class="today-split">
      <div class="today-left" id="todayLeft"></div>
      <div class="today-right" id="todayRight"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item" onclick="location.href='Home.html'">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-item active" onclick="openSheet()">
      <span class="nav-icon">➕</span><span class="nav-label">Today</span>
    </button>
    <button class="nav-item" onclick="location.href='Calendar.html'">
      <span class="nav-icon">📅</span><span class="nav-label">Calendar</span>
    </button>
  </div>
</div>

<div class="task-overlay" id="taskOverlay">
  <div class="task-center">
    <div class="top-nav task-center-nav">
      <div class="nav-logo"><div class="logo-icon">🐾</div></div>
      <span class="nav-title">Tasks</span>
      <button class="nav-action" onclick="closeTaskCenter()">✕</button>
    </div>
    <div class="task-tabs" id="taskTabs"></div>
    <div class="task-list" id="tab-pending"></div>
    <div class="task-list" id="tab-done" style="display:none;"></div>
  </div>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">快速記錄</div>
    <div class="sheet-tabs" id="sheetTabs"></div>
    <div class="sheet-tab-content" id="sheetTabContent"></div>
  </div>
</div>

<script>
// ── UI config ──
const TASK_DOT = {
  default:'task-dot-info',
  warn:'task-dot-warn',
  info:'task-dot-info',
  med:'task-dot-med'
};
const SHEET_SECTION_CLASS = {
  default:'sheet-section-life',
  life:'sheet-section-life',
  health:'sheet-section-health'
};
const SHEET_ITEM_CLASS = {
  default:'sheet-item-life',
  life:'sheet-item-life',
  health:'sheet-item-health'
};
// ── UserData ──
const todayData = {
  activePet: {
    name: 'Seoli',
    image: 'Seoli_the_Samoyed.png',
    mood: '😊 Happy'
  },
  weather: {
    date: new Date(),
    icon: '☀️ 晴天',
    temp: '🌡️ 23°C',
    tip: '🐾 今天很適合帶 Seoli 出去散步！'
  },
  healthInsights: [
    { icon: '💡', title: '健康摘要', text: 'Seoli 活動量偏低，今晚可以試試 15 分鐘輕鬆散步！' },
    { icon: '💧', title: '飲水量偏低', text: 'Seoli 今天的飲水量低於建議標準' },
    { icon: '💊', title: 'Lele 用藥提醒', text: '跳蚤預防藥今天到期，請至任務中心查看' }
  ],
  tasks: [
    { id: 'task-1', type: 'warn', title: 'Seoli 尚未散步', sub: '建議：30 分鐘戶外散步' },
    { id: 'task-2', type: 'info', title: '補充飲水量', sub: 'Seoli 今天需要多喝水' },
    { id: 'task-3', type: 'med', title: 'Lele 用藥提醒', sub: '跳蚤預防藥 — 今天到期' }
  ]
};

// ── SheetData ──
const sheetData = {
  life: {
    tabLabel: '事件記錄',
    sections: [
      {
        type: 'life',
        label: '生活',
        items: [
          { icon:'🥣', label:'吃飯' }, { icon:'💧', label:'喝水' },
          { icon:'🍭', label:'零食' }, { icon:'💊', label:'用藥' },
          { icon:'💩', label:'大便' }, { icon:'💦', label:'小便' },
          { icon:'🚶', label:'散步' }, { icon:'🏞️', label:'公園' },
          { icon:'🏊', label:'游泳' }, { icon:'🎮', label:'玩耍' },
          { icon:'💤', label:'睡眠' }, { icon:'🪮', label:'清潔' },
          { icon:'🛁', label:'洗澡' }, { icon:'🩺', label:'門診' }
        ]
      },
      {
        type: 'health',
        label: '健康',
        items: [
          { icon:'🤮', label:'嘔吐' }, { icon:'🚽', label:'拉肚子/便秘' },
          { icon:'🤐', label:'拒食' }, { icon:'🚿', label:'尿失禁/頻尿' },
          { icon:'🔴', label:'無法排尿' }, { icon:'👃', label:'咳嗽/呼吸困難' },
          { icon:'🫁', label:'張口呼吸/過度喘氣' }, { icon:'🦵', label:'跛腳/行走異常' },
          { icon:'🫥', label:'不願移動/明顯無力' }, { icon:'🫨', label:'行走失衡/打滑無力' },
          { icon:'⚡', label:'癲癇/抽搐' }, { icon:'😶', label:'呆滯/失神' },
          { icon:'🤪', label:'原地打轉/異常行為' }, { icon:'🐛', label:'持續搔癢/抓癢' },
          { icon:'🫧', label:'舔腳/過度舔毛' }, { icon:'🔥', label:'局部紅腫/皮膚異常' },
          { icon:'🦷', label:'扣牙/咀嚼異常' }, { icon:'👁️', label:'瞇眼/流淚/分泌物' },
          { icon:'🌡️', label:'發抖/發冷' }, { icon:'😪', label:'嗜睡/異常安靜' },
          { icon:'😡', label:'焦躁/吠叫異常' }, { icon:'🙈', label:'躲藏/不互動' },
          { icon:'💥', label:'攻擊性/變兇' }
        ]
      }
    ]
  },
  exp: {
    tabLabel: '體驗記錄',
    items: [
      { icon:'🚶', label:'散步' },
      { icon:'🏞️', label:'公園' },
      { icon:'🏊', label:'游泳' },
      { icon:'🎮', label:'玩耍' }
    ]
  }
};

// ── Render Today ──
function renderTodayLeft(todayData) {
  const pet = todayData.activePet;
  const el = document.getElementById('todayLeft');
  el.innerHTML = `
    <div class="today-left-label">今日狀態</div>
    <div class="today-status-card">
      <div class="status-unrated">
        <div class="status-unrated-text">尚未評估今日狀態</div>
        <button class="status-start-btn">開始評估</button>
      </div>
    </div>
    <div class="pet-3d-area">
      <div class="pet-mood-badge">${pet.mood}</div>
      <img class="dog-photo" src="${pet.image}" alt="${pet.name}">
      <div class="pet-3d-shadow"></div>
    </div>`;
}

function renderTodayRight(todayData) {
  const { weather, healthInsights } = todayData;
  const insightsHTML = healthInsights.map(i => `
    <div class="lg-card">
      <div class="insight-row">
        <span class="insight-row-icon">${i.icon}</span>
        <div class="insight-row-body">
          <div class="insight-row-title">${i.title}</div>
          <div class="insight-row-text">${i.text}</div>
        </div>
      </div>
    </div>`).join('');
  const formattedDate = new Intl.DateTimeFormat('en-CA').format(weather.date);
  document.getElementById('todayRight').innerHTML = `
    <div class="today-right-label">今日天氣</div>
    <div class="today-sky">
      <div class="sky-date">${formattedDate}</div>
      <div class="sky-info">
        <div class="sky-tag">${weather.icon}</div>
        <div class="sky-tag">${weather.temp}</div>
      </div>
      <div class="sky-tip">${weather.tip}</div>
    </div>
    <div class="today-right-label today-right-label-mt">健康觀察</div>
    ${insightsHTML}`;
}

// ── Render Task Center ──
let pendingCount = todayData.tasks.length;

function renderTaskCenter(todayData) {
  const tabsEl = document.getElementById('taskTabs');
  tabsEl.innerHTML = `
    <button class="task-tab active" onclick="switchTaskTab(this,'pending')">待完成 <span class="task-tab-count" id="pendingCount">${pendingCount}</span></button>
    <button class="task-tab" onclick="switchTaskTab(this,'done')">已完成</button>`;

  const pendingEl = document.getElementById('tab-pending');
  pendingEl.innerHTML = '';
  todayData.tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-item';
    item.id = task.id;
    let dotClass = TASK_DOT[task.type] ||TASK_DOT.default;
    item.innerHTML = `
      <div class="task-dot ${dotClass}"></div>
      <div class="task-item-body">
        <div class="task-item-title">${task.title}</div>
        <div class="task-item-sub">${task.sub}</div>
      </div>
      <div class="task-item-actions">
        <button class="task-action-btn task-done-btn" onclick="completeTask('${task.id}')">✔</button>
        <button class="task-action-btn task-delay-btn" onclick="delayTask('${task.id}')">⏰</button>
      </div>`;
    pendingEl.appendChild(item);
  });

  document.getElementById('tab-done').innerHTML = `<div class="task-done-empty" id="doneEmpty">目前沒有已完成的任務</div>`;
  document.getElementById('notifBadge').textContent = pendingCount;
}

// ── Render Sheet ──
function renderSheet(sheetData) {
  const tabsEl = document.getElementById('sheetTabs');
  const contentEl = document.getElementById('sheetTabContent');

  const keys = Object.keys(sheetData);
  tabsEl.innerHTML = keys.map((key, i) => {
    return `<button class="sheet-tab${i === 0 ? ' active' : ''}" onclick="switchTab(this,'${key}')">
      ${sheetData[key].tabLabel}
    </button>`;
  }).join('');

  const lifeHTML = sheetData.life.sections.map(sec => {
    let lblClass = SHEET_SECTION_CLASS[sec.type]||SHEET_SECTION_CLASS.default;
    let itmClass = SHEET_ITEM_CLASS[sec.type]||SHEET_ITEM_CLASS.default;
    const itemsHTML = sec.items.map(it =>
      `<button class="${itmClass}">
        <span class="sheet-item-icon">${it.icon}</span>
        <span class="sheet-item-label">${it.label}</span>
      </button>`
    ).join('');

    return `<div class="${lblClass}">${sec.label}</div><div class="sheet-grid">${itemsHTML}</div>`;
  }).join('');

  const expHTML = sheetData.exp.items.map(it => {
    const itmClass = 'sheet-item-exp';
    return `<button class="${itmClass}">
      <span class="sheet-item-icon sheet-item-icon-lg">${it.icon}</span>
      <span class="sheet-item-label sheet-item-label-lg">${it.label}</span>
    </button>`;
  }).join('');

  contentEl.innerHTML = `
    <div id="tab-life">${lifeHTML}</div>
    <div id="tab-exp" style="display:none;">
      <div class="sheet-grid sheet-grid-exp">${expHTML}</div>
    </div>`;
}

// ── Sheet controls ──
function openSheet() { document.getElementById('sheetOverlay').classList.add('open'); }
function closeSheet(e) {
  if (e.target === document.getElementById('sheetOverlay'))
    document.getElementById('sheetOverlay').classList.remove('open');
}
function switchTab(btn, tab) {
  document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['life','exp'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}

// ── Task controls ──
function openTaskCenter() { document.getElementById('taskOverlay').classList.add('open'); }
function closeTaskCenter() { document.getElementById('taskOverlay').classList.remove('open'); }
function switchTaskTab(btn, tab) {
  document.querySelectorAll('.task-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-pending').style.display = tab === 'pending' ? 'flex' : 'none';
  document.getElementById('tab-done').style.display = tab === 'done' ? 'flex' : 'none';
}
function completeTask(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const title = el.querySelector('.task-item-title').textContent;
  el.classList.add('task-removing');
  setTimeout(() => {
    el.remove();
    pendingCount = Math.max(0, pendingCount - 1);
    document.getElementById('pendingCount').textContent = pendingCount;
    const badge = document.getElementById('notifBadge');
    badge.textContent = pendingCount;
    if (pendingCount === 0) badge.style.display = 'none';
    document.getElementById('doneEmpty').style.display = 'none';
    const item = document.createElement('div');
    item.className = 'task-done-item';
    item.innerHTML = `<span class="task-done-check">✔</span><span class="task-done-title">${title}</span>`;
    document.getElementById('tab-done').appendChild(item);
  }, 280);
}
function delayTask(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('task-delayed');
  setTimeout(() => el.classList.remove('task-delayed'), 6000);
}

// ── Init ──
renderTodayLeft(todayData);
renderTodayRight(todayData);
renderTaskCenter(todayData);
renderSheet(sheetData);
</script>
</body>
</html>
